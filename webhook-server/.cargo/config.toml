[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"
rustflags = [
    "-C",
    "target-feature=+crt-static",
    "-C",
    "link-arg=-s",
    "-C",
    "link-arg=-lc",
    "-C",
    "link-arg=-lgcc",
]

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"
rustflags = [
    "-C",
    "target-feature=-crt-static",
    "-C",
    "link-arg=-s",
    "-C",
    "link-arg=-lc",
    "-C",
    "link-arg=-lgcc",
]
